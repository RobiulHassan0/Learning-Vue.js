<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task App</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Daisy UI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />

</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen py-8">
    
    <div class="container mx-auto max-w-2xl px-4">
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-gray-800 mb-2">My Tasks</h1>
            <p class="text-gray-600">Keep track of your important tasks</p>
        </div>

        <!-- Card Container -->
        <div class="card bg-white shadow-lg">
            <div class="card-body">
                
                <!-- Add Task Form (static) -->
                <div class="form-control mb-6">
                    <label class="label">
                        <span class="label-text font-semibold mb-4">Add New Task</span>
                    </label>

                    <div class="flex gap-2">
                        <input type="text" placeholder="Enter a new task..." 
                        class=" p-4  border-secondary outline-0 input input-secondary flex-1" />

                        <button class="btn btn-secondary text-white">Add Task</button>
                    </div>
                </div>

                <div class="divider"></div>

                <!-- Task List -->
                <div id="task-box" class="space-y-3">
                    <h2 id="tasks-title" class="text-lg font-semibold text-gray-700 mb-4">Tasks</h2>

                    <!-- Sample Task 1 -->
                    <ul id="list-group" class="space-y-3">

                    </ul>
                </div>
            </div>
        </div>
    </div>

<script src="myFetch.js"></script>    

<script src="index.js"></script>
</body>
</html>
